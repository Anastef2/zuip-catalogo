<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUIP — Gafas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="./" class="logo-link" aria-label="ZUIP">
        <img
          id="logo-img"
          class="logo-img"
          src="images/logo.png"
          alt="ZUIP"
          onerror="this.style.display='none'; document.getElementById('logo-text').style.display='inline-block';"
        >
        <span id="logo-text" class="logo-text">ZUIP</span>
      </a>
      <p class="tagline">Gafas con estilo</p>
    </div>
  </header>

  <main>
    <div id="portada" class="portada-grid">
      <!-- Las tarjetas de colección se generan aquí con JavaScript -->
    </div>
  </main>

  <footer class="site-footer">
    <h2 class="contacto-titulo">Contáctanos</h2>
    <p id="contacto-telefonos" class="contacto-telefonos"></p>
    <p id="contacto-instagram" class="contacto-instagram"></p>
    <p id="contacto-nota" class="contacto-nota"></p>
    <p class="copyright">&copy; <span id="anio"></span> ZUIP. Todos los derechos reservados.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
