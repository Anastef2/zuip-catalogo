<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUIP — Gafas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="./" class="logo-link" aria-label="ZUIP">
        <img
          id="logo-img"
          class="logo-img"
          src="images/logo.png"
          alt="ZUIP"
          onerror="this.style.display='none'; document.getElementById('logo-text').style.display='inline-block';"
        >
        <span id="logo-text" class="logo-text">ZUIP</span>
      </a>
      <p class="tagline">Gafas con estilo</p>
    </div>
  </header>

  <main>
    <div id="catalogo" class="catalogo-container">
      <!-- Las secciones por colección se generan aquí con JavaScript -->
    </div>
  </main>

  <footer class="site-footer">
    <h2 class="contacto-titulo">Contáctanos</h2>
    <p id="contacto-telefonos" class="contacto-telefonos"></p>
    <p id="contacto-instagram" class="contacto-instagram"></p>
    <p id="contacto-nota" class="contacto-nota"></p>
    <p class="copyright">&copy; <span id="anio"></span> ZUIP. Todos los derechos reservados.</p>
  </footer>

  <!-- Lightbox de imagen -->
  <div id="lightbox" class="modal-overlay" hidden>
    <div class="lightbox-box">
      <button id="cerrar-lightbox" class="modal-cerrar lightbox-cerrar" aria-label="Cerrar">&times;</button>
      <img id="lightbox-img" src="" alt="">
      <p id="lightbox-nombre" class="lightbox-nombre"></p>
    </div>
  </div>

  <!-- Modal de pago -->
  <div id="modal-pago" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
      <button id="cerrar-modal" class="modal-cerrar" aria-label="Cerrar">&times;</button>
      <h2 id="modal-titulo">Cómo pagar</h2>
      <p class="modal-producto" id="modal-producto-nombre"></p>

      <div class="datos-pago">
        <p><strong>Banco:</strong> <span id="pago-banco"></span></p>
        <p><strong>Tipo de cuenta:</strong> <span id="pago-tipo"></span></p>
        <p><strong>Número de cuenta:</strong> <span id="pago-numero"></span></p>
        <p><strong>Titular:</strong> <span id="pago-titular"></span></p>
        <p><strong>Identificación:</strong> <span id="pago-id"></span></p>
      </div>

      <div class="qr-wrapper">
        <img id="pago-qr" src="" alt="Código QR para transferencia">
      </div>

      <p class="modal-nota">Una vez realizada la transferencia, envíanos el comprobante para confirmar tu compra.</p>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
